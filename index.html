<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Tiny Question</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Gaegu:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="web web-left" aria-hidden="true"></div>
      <div class="web web-right" aria-hidden="true"></div>
      <section class="card">
        <div class="spidey-mark" aria-hidden="true">
          <svg viewBox="0 0 120 120" role="presentation">
            <circle cx="60" cy="60" r="56" class="spidey-ring" />
            <path
              class="spidey-body"
              d="M60 33c8 0 14 7 14 16 0 6-2 10-4 14l7 11-10 4-7 23-7-23-10-4 7-11c-2-4-4-8-4-14 0-9 6-16 14-16Z"
            />
            <path class="spidey-leg" d="M52 50 26 40" />
            <path class="spidey-leg" d="M50 58 22 57" />
            <path class="spidey-leg" d="M50 66 24 76" />
            <path class="spidey-leg" d="M54 74 34 94" />
            <path class="spidey-leg" d="M68 50 94 40" />
            <path class="spidey-leg" d="M70 58 98 57" />
            <path class="spidey-leg" d="M70 66 96 76" />
            <path class="spidey-leg" d="M66 74 86 94" />
            <path class="spidey-detail" d="M53 44c2 2 5 4 7 4s5-2 7-4" />
          </svg>
        </div>
        <p class="eyebrow">Aayu's friendly neighbourhood movie request</p>
        <h1>Ayana will u come watch spiderman brand new day with me</h1>
        <p class="subtext">
          u wont say no to me would u
        </p>

        <div class="scene">
          <div class="cityline" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="heart heart-one"></div>
          <div class="heart heart-two"></div>
          <div class="glow"></div>

          <div class="buttons" id="button-zone">
            <button class="btn btn-yes" id="yes-btn" type="button">Yes</button>
            <button class="btn btn-no" id="no-btn" type="button">No</button>
          </div>
        </div>

        <p class="message" id="message" aria-live="polite">
          choose wisely ayana
        </p>
      </section>

      <section class="celebration hidden" id="celebration" aria-live="polite">
        <div class="celebration-card">
          <p class="celebration-tag">mission accomplished</p>
          <h2>YAYYY LOVE U</h2>
          <img
            class="celebration-photo"
            src="./ayana-photo.jpg"
            alt="A photo for the celebration screen"
          />
          <p>
            YAYYY LOVE U AYANA, text me when you're free so we can plan
            Spider-Man.
          </p>
        </div>
      </section>

      <div class="confetti-layer hidden" id="confetti-layer" aria-hidden="true"></div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
